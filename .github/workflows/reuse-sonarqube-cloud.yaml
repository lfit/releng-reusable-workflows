# Runs a SonarQube Cloud scan
name: "[R] SonarQube Cloud ☁️"

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      # Optional
      sonar_root_cert:
        description: "Server root certificate PEM encoded"
        type: string
        required: false
      build_wrapper_url:
        # yamllint disable-line rule:line-length
        # e.g. https://raw.githubusercontent.com/o-ran-sc/ci-management/refs/heads/master/jjb/com-golog/prescan-golog-go-ubuntu.sh
        description: "Download location of build wrapper/script"
        type: string
        required: false
      build_wrapper_out_dir:
        description: "Filesystem location of build outputs"
        type: string
        required: false
      sonar_host_url:
        description: "Uploads scans to the given host URL"
        type: string
        required: false
        default: "https://sonarcloud.io"
      lc_all:
        # yamllint disable-line rule:line-length
        description: "Change when code character set is outside the range of en_US.UTF-8"
        type: string
        required: false
        default: "en_US.UTF-8"
      debug:
        description: "Enable debugging output"
        type: boolean
        required: false
        default: false
    # Reusable workflow requires secrets be explicitly passed
    secrets:
      sonar_token:
        description: "SonarQube API key/token"
        required: true

# Declare default permissions as none; jobs grant the minimum they need.
permissions: {}

jobs:
  sonarqube-cloud:
    name: "Scan"
    runs-on: ubuntu-24.04
    permissions:
      # The scan action checks out the repository under analysis.
      contents: read
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below
      # to consume in 'block' mode. Loading out-of-band means
      # the workflow no longer depends on any org-level GitHub
      # variable being exposed at runtime (org variables are
      # unreachable from workflows triggered by PRs raised from
      # forks, which previously forced a fallback to audit mode).
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          # yamllint disable-line rule:line-length
          config: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@ca8ce369a97afc64b6895266f10df9b5f5969743'  # v0.6.0

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: "SonarQube Cloud Scan"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/sonarqube-cloud-scan-action@b8d74f08d2222acb4556b71f9f3cd3e80bc8109b # v1.2.1
        with:
          sonar_token: ${{ secrets.sonar_token }}
          sonar_root_cert: ${{ inputs.sonar_root_cert }}
          build_wrapper_url: ${{ inputs.build_wrapper_url }}
          build_wrapper_out_dir: ${{ inputs.build_wrapper_out_dir }}
          sonar_host_url: ${{ inputs.sonar_host_url }}
          lc_all: ${{ inputs.lc_all }}
          debug: ${{ inputs.debug }}
