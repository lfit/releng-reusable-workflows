# Runs a Sonatype Lifecycle (Nexus IQ) scan
name: "[R] Sonatype Lifecycle ♻️"

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      java_distribution:
        description: "JAVA SE distribution to setup/run for Nexus CLI tool"
        required: false
        type: string
        default: "temurin"
      java_version:
        description: "Java runtime to setup/run for Nexus CLI tool"
        required: false
        type: number
        default: 17
      iq_cli_version:
        description: "Specific version of Nexus CLI to setup/run"
        required: false
        type: string
        default: "2.4.2-01"
      application_id:
        description: "Organisation and project name in Nexus IQ"
        required: false
        type: string
        # yamllint disable-line rule:line-length
        default: ${{ github.repository_owner }}-${{ github.event.repository.name }}
      scan_targets:
        description: "Location of file(s) or folder(s) to scan"
        required: false
        type: string
        default: "."
      debug:
        description: "Enable debug logging"
        required: false
        type: boolean
        default: false
    # Reusable workflow requires secrets be explicitly passed
    secrets:
      nexus_iq_password:
        description: "Nexus IQ Password"
        required: true

# Declare default permissions as none; jobs grant the minimum they need.
permissions: {}

jobs:
  sonatype-cli:
    name: "Scan"
    runs-on: ubuntu-latest
    permissions:
      # The scan action checks out the repository under analysis.
      contents: read
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below
      # to consume in 'block' mode. Loading out-of-band means
      # the workflow no longer depends on any org-level GitHub
      # variable being exposed at runtime (org variables are
      # unreachable from workflows triggered by PRs raised from
      # forks, which previously forced a fallback to audit mode).
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          # yamllint disable-line rule:line-length
          config: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@9daeea15f1cce57566d8c91ebaf24a4a190da2e2'  # v0.4.0

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: "Sonatype Lifecycle Scan"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/sonatype-lifecycle-scan-action@974066f00a3b7989013bd588cd56f7451933fed8  # v0.1.4
        with:
          nexus_iq_server: ${{ vars.NEXUS_IQ_SERVER }}
          nexus_iq_username: ${{ vars.NEXUS_IQ_USERNAME }}
          nexus_iq_password: ${{ secrets.nexus_iq_password }}
          java_distribution: ${{ inputs.java_distribution }}
          java_version: ${{ inputs.java_version }}
          iq_cli_version: ${{ inputs.iq_cli_version }}
          application_id: ${{ inputs.application_id }}
          scan_targets: ${{ inputs.scan_targets }}
          debug: ${{ inputs.debug }}
