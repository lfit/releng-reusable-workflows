# SPDX-FileCopyrightText: 2023 The Linux Foundation

name: Compose rtdv3 Verify

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      GERRIT_BRANCH:
        description: "Branch that change is against"
        required: true
        type: string
      GERRIT_CHANGE_ID:
        description: "The ID for the change"
        required: true
        type: string
      GERRIT_CHANGE_NUMBER:
        description: "The Gerrit number"
        required: true
        type: string
      GERRIT_CHANGE_URL:
        description: "URL to the change"
        required: true
        type: string
      GERRIT_EVENT_TYPE:
        description: "Type of Gerrit event"
        required: true
        type: string
      GERRIT_PATCHSET_NUMBER:
        description: "The patch number for the change"
        required: true
        type: string
      GERRIT_PATCHSET_REVISION:
        description: "The revision sha"
        required: true
        type: string
      GERRIT_PROJECT:
        description: "Project in Gerrit"
        required: true
        type: string
      GERRIT_REFSPEC:
        description: "Gerrit refspec of change"
        required: true
        type: string
      TARGET_REPO:
        # yamllint disable-line rule:line-length
        description: "The target GitHub repository needing the required workflow"
        required: false
        default: ${{ github.repository }}
        type: string
    secrets:
      RTD_TOKEN:
        description: "RTD API user token"
        required: true

concurrency:
  # yamllint disable-line rule:line-length
  group: compose-rtdv3-verify-${{ github.workflow }}-${{ github.event.inputs.GERRIT_BRANCH}}-${{ github.event.inputs.GERRIT_CHANGE_ID || github.run_id }}
  cancel-in-progress: true

env:
  DEFAULT_PYTHON: 3.9
  READTHEDOCS_FOUND: true
  TOX_ENVS: docs,docs-linkcheck
  TOX_DIR: docs/
  DOC_DIR: _build/html
  PARALLEL: true
  DEFAULT_VERSION: latest
  MASTER_RTD_PROJECT: doc

jobs:
  rtd-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Gerrit Checkout
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
          gerrit-project: ${{ inputs.GERRIT_PROJECT }}
          gerrit-url: ${{ vars.GERRIT_URL }}
          delay: "0s"
          submodules: "true"

      # Parse the documentation Python version from both docs/tox.ini and
      # .readthedocs.yaml, compare them, and warn when they diverge. The tox
      # verification job must exercise the same Python version that
      # ReadTheDocs uses, otherwise the two jobs are not testing the same
      # thing. The resolved version is fed to setup-python so the interpreter
      # tox needs is actually installed on the runner.
      - name: Compare TOX and ReadTheDocs Python versions
        # yamllint disable rule:line-length
        id: docs-python
        run: |
          set -euo pipefail

          TOX_FILE="docs/tox.ini"
          RTD_FILE=".readthedocs.yaml"

          # Normalise a tox basepython token to a bare X.Y version. Returns an
          # empty string for generic interpreters (py3, python3, python).
          normalise_version() {
            local v
            v="$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')"
            v="${v#python}"
            v="${v#py}"
            if printf '%s' "$v" | grep -Eq '^[0-9]+\.[0-9]+$'; then
              printf '%s' "$v"
            elif printf '%s' "$v" | grep -Eq '^[0-9]{2,3}$'; then
              printf '%s.%s' "${v:0:1}" "${v:1}"
            else
              printf ''
            fi
          }

          # Extract basepython from the [testenv:docs] section only.
          tox_raw=""
          if [ -f "$TOX_FILE" ]; then
            tox_raw="$(awk '
              /^[[:space:]]*\[testenv:docs\][[:space:]]*$/ {f=1; next}
              /^[[:space:]]*\[/ {f=0}
              f && /^[[:space:]]*basepython[[:space:]]*=/ {
                sub(/^[^=]*=[[:space:]]*/, "")
                sub(/[#;].*/, "")
                gsub(/[[:space:]]/, "")
                print
                exit
              }
            ' "$TOX_FILE")"
          fi
          tox_py="$(normalise_version "$tox_raw")"

          # Extract build.tools.python from the ReadTheDocs configuration.
          # Track indentation so only build: -> tools: -> python: matches,
          # never a similarly named key elsewhere in the document.
          rtd_py=""
          if [ -f "$RTD_FILE" ]; then
            rtd_line="$(awk '
              /^[[:space:]]*$/ { next }
              /^[[:space:]]*#/ { next }
              {
                n = match($0, /[^ ]/)
                indent = (n > 0) ? n - 1 : 0
                content = $0
                sub(/^ +/, "", content)
              }
              indent == 0 {
                in_build = (content ~ /^build:/) ? 1 : 0
                in_tools = 0
                next
              }
              in_build && content ~ /^tools:/ { in_tools = 1; tools_indent = indent; next }
              in_build && in_tools && indent <= tools_indent { in_tools = 0 }
              in_build && in_tools && content ~ /^python:/ { print content; exit }
            ' "$RTD_FILE")"
            rtd_py="$(printf '%s' "$rtd_line" | sed -E 's/#.*//' | grep -oE '[0-9]+\.[0-9]+' | head -n1 || true)"
          fi

          # Decide which version to install for the tox run.
          if [ -n "$tox_py" ]; then
            setup_py="$tox_py"
          elif [ -n "$rtd_py" ]; then
            setup_py="$rtd_py"
          else
            setup_py="${DEFAULT_PYTHON}"
          fi

          # Compare and build a warning message when the versions diverge.
          mismatch="false"
          warn_msg=""
          if [ -n "$rtd_py" ]; then
            if [ -n "$tox_py" ] && [ "$tox_py" != "$rtd_py" ]; then
              mismatch="true"
              warn_msg="Documentation Python version mismatch: ${TOX_FILE} [testenv:docs] basepython '${tox_raw}' (Python ${tox_py}) does not match ${RTD_FILE} build.tools.python '${rtd_py}'. The tox verification job and the ReadTheDocs build are NOT testing the same Python version. Align ${TOX_FILE} with ${RTD_FILE}."
            elif [ -z "$tox_py" ]; then
              mismatch="true"
              if [ -n "$tox_raw" ]; then
                warn_msg="${TOX_FILE} [testenv:docs] uses a generic interpreter ('basepython = ${tox_raw}') while ${RTD_FILE} pins Python ${rtd_py}. Set 'basepython = python${rtd_py}' so the tox verification job matches the ReadTheDocs build."
              else
                warn_msg="${TOX_FILE} [testenv:docs] does not set basepython while ${RTD_FILE} pins Python ${rtd_py}. Set 'basepython = python${rtd_py}' so the tox verification job matches the ReadTheDocs build."
              fi
            fi
          fi

          # Surface findings in the job log.
          echo "INFO: ${TOX_FILE} basepython: '${tox_raw:-<unset>}' (resolved: ${tox_py:-generic})"
          echo "INFO: ${RTD_FILE} python: '${rtd_py:-<none>}'"
          echo "INFO: Python version selected for tox run: ${setup_py}"

          # Surface findings in the run summary for reviewers.
          {
            echo "### Documentation Python version check"
            echo ""
            echo "| Source | Configured | Resolved |"
            echo "| ------ | ---------- | -------- |"
            echo "| \`${TOX_FILE}\` \`[testenv:docs]\` basepython | \`${tox_raw:-<unset>}\` | ${tox_py:-generic} |"
            echo "| \`${RTD_FILE}\` \`build.tools.python\` | \`${rtd_py:-<none>}\` | ${rtd_py:-n/a} |"
            echo "| Python installed for tox run | | \`${setup_py}\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$mismatch" = "true" ]; then
            echo "::warning title=Docs Python version mismatch::${warn_msg}"
            {
              echo "> [!WARNING]"
              echo "> ${warn_msg}"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ -n "$rtd_py" ] && [ -n "$tox_py" ]; then
            echo "INFO: ${TOX_FILE} and ${RTD_FILE} Python versions are aligned (${tox_py})."
            {
              echo "\`${TOX_FILE}\` and \`${RTD_FILE}\` Python versions are aligned (\`${tox_py}\`)."
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo "tox_python_raw=${tox_raw}"
            echo "tox_python=${tox_py}"
            echo "rtd_python=${rtd_py}"
            echo "setup_python=${setup_py}"
            echo "mismatch=${mismatch}"
          } >> "$GITHUB_OUTPUT"
        # yamllint enable rule:line-length

      - name: Setup Python [docs build]
        # yamllint disable-line rule:line-length
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        id: setup-python
        with:
          python-version: "${{ steps.docs-python.outputs.setup_python }}"

      - name: Install graphviz
        # yamllint disable-line rule:line-length
        uses: tlylt/install-graphviz@b2201200d85f06f0189cb74d9b69208504cf12cd # v1.0.0
      - name: Verify If readthedocs Config exists
        run: |
          echo "Verifying if readthedocs.yaml config file exists"
          if [ ! -f .readthedocs.yaml ] ; then
            echo "INFO Config file not found. Skipping further checks."
            echo "READTHEDOCS_FOUND=false" >> "$GITHUB_ENV"
          fi

      - name: Installing dependencies
        if: ${{ env.READTHEDOCS_FOUND == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install lftools 'niet~=1.4.2' yq tox
          # urllib3 needs to be pinned to avoid timeouts
          pip install --upgrade urllib3~=1.26.15
      - name: Running tox
        # yamllint disable rule:line-length
        if: ${{ env.READTHEDOCS_FOUND == 'true' }}
        run: |
          PATH="${GITHUB_WORKSPACE}/.local/bin:${PATH}"

          cd "${GITHUB_WORKSPACE}/${TOX_DIR}" || exit 1

          if [[ -d /opt/pyenv ]]; then
              echo "---> Setting up pyenv"
              export PYENV_ROOT="/opt/pyenv"
              export PATH="$PYENV_ROOT/bin:$PATH"
              PYTHONPATH="$(pwd)"
              export PYTHONPATH
              export TOX_TESTENV_PASSENV=PYTHONPATH
          fi
          #Useful debug
          tox --version

          PARALLEL=${{ env.PARALLEL }}
          TOX_OPTIONS_LIST=""
          if [[ -n ${{ env.TOX_ENVS }} ]]; then
              TOX_OPTIONS_LIST=${TOX_OPTIONS_LIST}" -e ${{ env.TOX_ENVS }}"
          fi;
          case ${PARALLEL,,} in
              true|auto )
                  TOX_OPTIONS_LIST=$TOX_OPTIONS_LIST" --parallel auto --parallel-live";;
              all )
                  TOX_OPTIONS_LIST=$TOX_OPTIONS_LIST" --parallel all --parallel-live";;
              [0-9]* )
                  TOX_OPTIONS_LIST=$TOX_OPTIONS_LIST" --parallel ${PARALLEL} --parallel-live";;
          esac

          # $TOX_OPTIONS_LIST are intentionally not surrounded by quotes
          # to correctly pass options to tox
          # shellcheck disable=SC2086
          tox $TOX_OPTIONS_LIST

          echo "---> Completed tox runs"

      - name: Running rtdv3
        if: ${{ env.READTHEDOCS_FOUND == 'true' }}
        run: |
          echo "---> Running rtdv3"
          set -euo pipefail

          # Creating lftools config file
          mkdir -p "${HOME}/.config/lftools"
          cat << EOF > "${HOME}/.config/lftools/lftools.ini"
          [rtd]
          endpoint=https://readthedocs.org/api/v3/
          token=${{ secrets.RTD_TOKEN }}
          EOF

          watchbuild(){
              echo "INFO: Running build against branch $1"
              local buildid
              local result
              buildid=$(lftools rtd project-build-trigger "$rtdproject" "$1" | jq '.build.id')

              result=null
              while [[ "$result" == null ]]; do
                  sleep 10
                  result=$(lftools rtd project-build-details "$rtdproject" "$buildid"  | jq '.success')
                  echo "INFO Current result of running build $result"
                  if [[ $result == failed ]]; then
                      echo "INFO: read the docs build completed with status: $result"
                      exit 1
                  fi
              done
              echo "INFO: read the docs build completed with status: $result"
          }
          project_original=${{ inputs.GERRIT_PROJECT }}
          project_dashed="${project_original////-}"
          umbrella=$(echo ${{ inputs.GERRIT_CHANGE_URL }} | awk -F'.' '{print $2}')
          rtdproject="$umbrella-$project_dashed"
          masterproject=${umbrella}-${{ env.MASTER_RTD_PROJECT }}
          #Exceptions needed for onap, due to importing their old docs.
          if [[ $masterproject == "onap-doc" ]]; then
              masterproject="onap"
          fi
          if [[ $rtdproject == "onap-doc" ]]; then
              rtdproject="onap"
          fi
          echo "INFO:"
          echo "INFO: Project: ${{ inputs.GERRIT_PROJECT }}"
          echo "INFO: Read the Docs Sub Project: https://$rtdproject.readthedocs.io"
          echo "INFO: Read the Docs Master Project: https://$masterproject.readthedocs.io"
          if [[ "$(lftools rtd project-details "$rtdproject" | yq -r '.detail')" == "Not found." ]]; then
              echo "INFO: Project not found, merge will create project https://$rtdproject.readthedocs.io"
          fi
          echo "INFO: Verify job completed"
