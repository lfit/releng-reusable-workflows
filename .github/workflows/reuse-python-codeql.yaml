# SPDX-FileCopyrightText: 2024 The Linux Foundation

name: "[R] CodeQL Python Scan"

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      codeql_config:
        description: "Path to a CodeQL config file (relative to repo root)"
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  analyze:
    name: "CodeQL Scan: ${{ matrix.language }}"
    # yamllint disable-line rule:line-length
    runs-on: ${{ matrix.language == 'swift' && 'macos-latest' || 'ubuntu-24.04' }}
    timeout-minutes: ${{ (matrix.language == 'swift' && 120) || 360 }}
    permissions:
      security-events: write
      # required to fetch internal or private CodeQL packs
      packages: read
      # only required for workflows in private repositories
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none

    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Cache dependencies'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 'Initialize CodeQL'
        # yamllint disable-line rule:line-length
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ${{ inputs.codeql_config }}

      - name: "Perform CodeQL Analysis: ${{ matrix.language }}"
        # yamllint disable-line rule:line-length
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          output: codeql-results  # Specify the output directory for results

      - name: 'Upload CodeQL results'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-results
          path: codeql-results/
