# Verifies action/workflow calls are pinned to SHA commit values
name: '📌 [R] Audit GitHub Actions'

# yamllint disable-line rule:truthy
on:
  workflow_call:

permissions: {}

jobs:
  check-actions:
    name: 'Pinned Versions'
    runs-on: 'ubuntu-24.04'
    permissions:
      contents: read
    steps:
      - name: 'Check Pinned Versions'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/pinned-versions-action@38f4a2758d6314213f744dba3f0d68335e5562bf # v0.1.2
